<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Modern Image Slider</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <!-- Animated grid lines background -->
    <div class="grid-bg"></div>

    <!-- Corner accents -->
    <div class="corner corner-tl"></div>
    <div class="corner corner-tr"></div>
    <div class="corner corner-bl"></div>
    <div class="corner corner-br"></div>

    <div class="page">
      <div class="card">
        <div class="top-bar">
          <div class="title-wrap">
            <div class="title-dot"></div>
            <span class="slider-title">Image Slider</span>
          </div>
          <span class="counter" id="counter">1 / 5</span>
        </div>

        <div class="img-wrap">
          <img class="slide" id="slideImg" src="" alt="Slide" />
          <div class="img-overlay"></div>
          <div class="img-label" id="imgLabel">Nature · 1</div>

          <!-- Side arrow buttons on image -->
          <button class="arrow-btn arrow-left" onclick="go(-1)">&#8592;</button>
          <button class="arrow-btn arrow-right" onclick="go(1)">&#8594;</button>
        </div>

        <div class="progress-bar">
          <div class="progress-fill" id="progressFill" style="width: 20%"></div>
        </div>

        <div class="bottom-row">
          <div class="dots" id="dots"></div>
          <button class="play-btn" id="playBtn" onclick="togglePlay()">
            &#9654;
          </button>
        </div>
      </div>
    </div>

    <script src="script.js"></script>
  </body>
</html>
